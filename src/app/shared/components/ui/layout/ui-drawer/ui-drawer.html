@if (visible()) {
  <!-- Scrim + positioner are SIBLINGS (both direct @if children) so each animates its own
       leave independently — a nested animated element would deadlock the removal.
       The positioner carries the directional slide; the panel inside owns sizing/surface. -->
  @if (modal()) {
    <div
      #scrim
      class="ui-drawer-scrim"
      [class._contained]="contained()"
      [style.z-index]="zIndex()"
      [uiMotion]="'fade'"
      [motionDisabled]="motionDisabled()"
      #scrimMotion="uiMotion"
      [animate.enter]="scrimMotion.enter()"
      [animate.leave]="scrimMotion.leave()"
      (pointerdown)="onMaskPointerdown($event)"
    ></div>
  }

  <div
    class="ui-drawer-positioner"
    [class._left]="position() === 'left'"
    [class._right]="position() === 'right'"
    [class._top]="position() === 'top'"
    [class._bottom]="position() === 'bottom'"
    [class._full-screen]="fullScreen()"
    [class._contained]="contained()"
    [style.z-index]="zIndex()"
    [uiMotion]="motionPreset()"
    [motionDistance]="motionDistance()"
    [motionDisabled]="motionDisabled()"
    #posMotion="uiMotion"
    [animate.enter]="posMotion.enter()"
    [animate.leave]="posMotion.leave()"
    (keydown)="onKeydown($event)"
  >
    <div
      #panel
      [class]="'ui-drawer' + (styleClass() ? ' ' + styleClass() : '')"
      [attr.role]="role()"
      [attr.aria-modal]="modal() ? 'true' : null"
      [attr.aria-label]="resolvedAriaLabel()"
      [attr.aria-labelledby]="labelledBy()"
      tabindex="-1"
      [ngStyle]="drawerStyle()"
      [cdkTrapFocus]="focusTrap()"
      [cdkTrapFocusAutoCapture]="focusOnShow()"
    >
      @if (headlessTemplate(); as tpl) {
        <ng-container [ngTemplateOutlet]="tpl" />
      } @else {
        @if (showHeader()) {
          <div class="ui-drawer-header">
            <div [attr.id]="titleId" class="ui-drawer-title">
              @if (headerTemplate(); as tpl) {
                <ng-container [ngTemplateOutlet]="tpl" />
              } @else {
                {{ header() }}
              }
            </div>

            @if (closable()) {
              <button
                type="button"
                class="ui-drawer-action"
                [attr.aria-label]="closeAriaLabel()"
                (click)="close()"
              >
                @if (closeIconTemplate(); as tpl) {
                  <ng-container [ngTemplateOutlet]="tpl" />
                } @else {
                  <ui-icon [name]="closeIcon()" size="sm" />
                }
              </button>
            }
          </div>
        }

        <!-- Body: long content scrolls inside this region. -->
        <div class="ui-drawer-content">
          <ng-content />
        </div>

        @if (footerTemplate(); as tpl) {
          <div class="ui-drawer-footer">
            <ng-container [ngTemplateOutlet]="tpl" />
          </div>
        }
      }
    </div>
  </div>
}
